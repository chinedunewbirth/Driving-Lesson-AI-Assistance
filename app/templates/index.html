{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="jumbotron">
    <h1 class="display-4">Welcome to AI Driving School</h1>
    <p class="lead">Learn to drive with AI-powered feedback and personalized lessons.</p>

    {% endif %}
</div>
{% endblock %}
