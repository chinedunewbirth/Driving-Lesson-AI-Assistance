{% extends "base.html" %}

{% block title %}Students{% endblock %}

{% block content %}
<h2>Students</h2>
<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
            <tr>
                <td>{{ student.first_name }} {{ student.last_name }}</td>
                <td>{{ student.user.email }}</td>
                <td>{{ student.phone }}</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
